<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oyple</title>
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="centralizer">
    <div class="dropdown">
      <span class="dropdown-flex">
        <img src="../assets/calendar-tick2.svg" alt="" />
        <p style="font-size: 14px">View event</p>
      </span>
      <span class="dropdown-flex">
        <img src="../assets/edit.svg" alt="" />
        <p style="font-size: 14px">Edit</p>
      </span>
      <span class="dropdown-flex">
        <img src="../assets/copy.svg" alt="" />
        <p style="font-size: 14px">Copy link</p>
      </span>
      <span class="dropdown-flex selected"
        ><img src="../assets/trash.svg" alt="" />
        <p style="font-size: 14px">Delete event</p>
      </span>
    </div>
  </body>
</html>
