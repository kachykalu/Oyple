<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="centralizer">
    <div class="verify">
      <div class="vector-img"><img src="../assets/Vector.svg" alt="" /></div>
      <div class="loading1"><span></span></div>
      <div class="go-back">
        <img
          src="../assets/arrow-up.svg"
          style="transform: rotate(-180deg)"
          alt=""
        />
        <p
          style="
            font-size: 14px;
            font-style: normal;
            font-weight: 500;
            line-height: normal;
            color: #5e779d;
          "
        >
          Go back
        </p>
      </div>
      <p
        style="
          font-size: 20px;
          font-style: normal;
          font-weight: 500;
          line-height: 140%;
        "
      >
        Verify your identity
      </p>
      <p
        style="
          font-size: 14px;
          font-style: normal;
          font-weight: 400;
          line-height: 20px;
          color: #6b6c7e;
        "
      >
        In compliance with local regulations, we need to know more about you.
        Please provide your personal information.
      </p>
      <hr
        style="margin-top: 32px; margin-bottom: 32px; border: 1px solid #eee"
      />
      <div class="first-last-name">
        <span class="full-name">
          <label
            style="
              font-size: 16px;
              font-style: normal;
              font-weight: 400;
              line-height: 24px;
              color: #6b6c7e;
            "
            for=""
            >First Name</label
          >
          <input type="text" placeholder="Enter first name" />
        </span>
        <span class="full-name">
          <label
            style="
              font-size: 16px;
              font-style: normal;
              font-weight: 400;
              line-height: 24px;
              color: #6b6c7e;
            "
            for=""
            >Last Name</label
          >
          <input type="text" placeholder="Enter last name" />
        </span>
      </div>
      <span class="gender">
        <label
          style="
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 24px;
            color: #6b6c7e;
            margin-top: 16px;
          "
          for=""
          >Gender</label
        ><span class="gender-span">
          <p
            style="
              font-size: 14px;
              font-style: normal;
              font-weight: 400;
              line-height: 20px;
              color: #6b6c7e;
            "
          >
            Select gender
          </p>
          <img src="../assets/iconamoon_arrow-up-2.svg" alt="" />
        </span>
      </span>
      <span class="d-o-b">
        <label
          style="
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 24px;
            color: #6b6c7e;
            margin-top: 16px;
          "
          for=""
          >Date of birth</label
        ><span class="d-o-b-flex">
          <img src="../assets/calendar.svg" alt="" />
          <p
            style="
              font-size: 14px;
              font-style: normal;
              font-weight: 400;
              line-height: 20px;
              color: #6b6c7e;
            "
          > 
          </p>
        </span>
      </span>
      <span class="proceed-button"><p>Next</p></span>
      <span
        style="
          font-size: 12px;
          font-style: normal;
          font-weight: 400;
          line-height: normal;
        "
        >Having any issues?<a
          style="
            font-size: 12px;
            font-style: normal;
            font-weight: 500;
            line-height: normal;
            color: #5e779d;
          "
        >
          Contact us</a
        ></span
      >
    </div>
  </body>
</html>
