<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oyple</title>
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="centralizer">
    <div class="home-address">
      <div class="vector-img"><img src="../assets/Vector.svg" alt="" /></div>
      <div class="loading2"><span></span></div>
      <div class="go-back">
        <img
          src="../assets/arrow-up.svg"
          style="transform: rotate(-180deg)"
          alt=""
        />
        <p
          style="
            font-size: 14px;
            font-style: normal;
            font-weight: 500;
            line-height: normal;
            color: #5e779d;
          "
        >
          Go back
        </p>
      </div>
      <p
        style="
          font-size: 20px;
          font-style: normal;
          font-weight: 500;
          line-height: 140%;
        "
      >
        Home address
      </p>
      <p
        style="
          font-size: 14px;
          font-style: normal;
          font-weight: 400;
          line-height: 20px;
          color: #6b6c7e;
        "
      >
        We only use this information to confirm your personal information.
      </p>
      <hr
        style="margin-top: 32px; margin-bottom: 32px; border: 1px solid #eee"
      />
      <span class="address-line">
        <label
          style="
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 24px;
            color: #6b6c7e;
          "
          for=""
          >Address line 1</label
        >
        <input type="text" placeholder="Apartment, suite, unit, etc. (optional)" />
      </span>
      <span class="address-line">
        <label
          style="
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 24px;
            color: #6b6c7e;
          "
          for=""
          >Address line 2 (Optional)</label
        >
        <input type="text" placeholder="Apartment, suite, unit, etc. (optional)" />
      </span>
      <span class="state">
        <label
          style="
            font-size: 16px;
            font-style: normal;
            font-weight: 400;
            line-height: 24px;
            color: #6b6c7e;
          "
          for=""
          >State</label
        ><span class="state-span">
          <p
            style="
              font-size: 14px;
              font-style: normal;
              font-weight: 400;
              line-height: 20px;
              color: #6b6c7e;
            "
          >
            Select your state
          </p>
          <img src="../assets/iconamoon_arrow-up-2.svg" alt="" />
        </span>
      </span>
      <div class="lga-postal">
        <span class="lga-city">
            <label
              style="
                font-size: 16px;
                font-style: normal;
                font-weight: 400;
                line-height: 24px;
                color: #6b6c7e;
              "
              for=""
              >LGA/City</label
            ><span class="state-span">
              <p
                style="
                  font-size: 14px;
                  font-style: normal;
                  font-weight: 400;
                  line-height: 20px;
                  color: #6b6c7e;
                "
              >
                Select your state
              </p>
              <img src="../assets/iconamoon_arrow-up-2.svg" alt="" />
            </span>
          </span>
        <span class="postal-code">
          <label
            style="
              font-size: 16px;
              font-style: normal;
              font-weight: 400;
              line-height: 24px;
              color: #6b6c7e;
            "
            for=""
            >Postal code</label
          >
          <input type="text" placeholder="" />
        </span>
      </div>
      <span class="proceed-button"><p>Next</p></span>
      <span
        style="
          font-size: 12px;
          font-style: normal;
          font-weight: 400;
          line-height: normal;
        "
        >Having any issues?<a
          style="
            font-size: 12px;
            font-style: normal;
            font-weight: 500;
            line-height: normal;
            color: #5e779d;
          "
        >
          Contact us</a
        ></span
      >
    </div>
  </body>
</html>
