<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oyple</title>
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="centralizer">
    <div class="document-verification">
      <div>
        <div class="vector-img"><img src="../assets/Vector.svg" alt="" /></div>
        <div class="loading4"><span></span></div>
        <div class="go-back">
          <img
            src="../assets/arrow-up.svg"
            style="transform: rotate(-180deg)"
            alt=""
          />
          <p
            style="
              font-size: 14px;
              font-style: normal;
              font-weight: 500;
              line-height: normal;
              color: #5e779d;
            "
          >
            Go back
          </p>
        </div>
        <p
          style="
            font-size: 20px;
            font-style: normal;
            font-weight: 500;
            line-height: 140%;
          "
        >
          Document Verification
        </p>
        <hr
          style="margin-top: 32px; margin-bottom: 32px; border: 1px solid #eee"
        />
        <span class="enter-bvn">
          <label
            style="
              font-size: 16px;
              font-style: normal;
              font-weight: 400;
              line-height: 24px;
              color: #6b6c7e;
            "
            for=""
            >Enter your bank verification number</label
          >
          <input type="text" placeholder="" />
        </span>
      </div>
      <div>
        <span class="proceed-button"><p>Next</p></span>
        <span
          style="
            font-size: 12px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
          "
          >Having any issues?<a
            style="
              font-size: 12px;
              font-style: normal;
              font-weight: 500;
              line-height: normal;
              color: #5e779d;
            "
          >
            Contact us</a
          ></span
        >
      </div>
    </div>
  </body>
</html>
