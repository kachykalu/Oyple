                padding: 20px 16px;

              <img src="../assets/setting-2.svg" alt="" />

            </span>

        </div>
        <div style="margin-bottom: 24px">

                flex-direction: row;

                gap: 8px;
              "

                class="profileAvatar"

              />
              <span

      <section class="events">

        </div>
        <div class="search-go">
            <div class="input-icon">

          <img src="../assets/search-normal.svg" alt="">

          <span class="go-to-shop">Go to shop</span>
        </div>
        <hr class="events-hr" />

            <img

              src="../assets/sm.png"
              alt=""
            />
            <h4 style="width: 100%;">No events yet</h4>
            <p style="margin-top: 4px;margin-bottom: 24px;">

              published events will be displayed here
            </p>
            <span class="go-to-shop">Go to shop</span>
          </div>
