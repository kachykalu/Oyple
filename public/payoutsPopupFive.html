<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oyple</title>
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="centralizer">
    <div class="bank-for-payouts">
      <div>
        <div class="vector-img"><img src="../assets/Vector.svg" alt="" /></div>
        <p
          style="
            font-size: 20px;
            font-style: normal;
            font-weight: 500;
            line-height: 140%;
          "
        >
          Document Verification
        </p>
        <p
          style="
            font-size: 14px;
            font-style: normal;
            font-weight: 400;
            line-height: 20px;
            color: #6b6c7e;
          "
        >
          The account holder’s name must match the information provided on your
          documents to pass your identity verification process.
        </p>
        <hr
          style="margin-top: 32px; margin-bottom: 32px; border: 1px solid #eee"
        />
        <span class="account-number">
          <label
            style="
              font-size: 16px;
              font-style: normal;
              font-weight: 400;
              line-height: 24px;
              color: #6b6c7e;
            "
            for=""
            >Bank account number</label
          >
          <input type="text" placeholder="" />
        </span>
        <span class="select-bank">
          <label
            style="
              font-size: 16px;
              font-style: normal;
              font-weight: 400;
              line-height: 24px;
              color: #6b6c7e;
            "
            for=""
            >Select bank</label
          ><span class="select-bank-span">
            <p
              style="
                font-size: 14px;
                font-style: normal;
                font-weight: 400;
                line-height: 20px;
                color: #6b6c7e;
              "
            >
              Select bank
            </p>
            <img src="../assets/iconamoon_arrow-up-2.svg" alt="" />
          </span>
        </span>
        <span class="account-number">
          <label
            style="
              font-size: 16px;
              font-style: normal;
              font-weight: 400;
              line-height: 24px;
              color: #6b6c7e;
            "
            for=""
            >Amount</label
          >
          <input type="text" placeholder="0.00" />
        </span>
        <div class="amount-flex">
          <p
            style="
              color: #6b6c7e;
              font-size: 12px;
              font-style: normal;
              font-weight: 400;
              line-height: normal;
            "
          >
            Total wallet amount:
          </p>
          <p
            style="
              color: #1e2320;
              font-size: 12px;
              font-style: normal;
              font-weight: 600;
              line-height: normal;
            "
          > ₦45,500.00</p>
         
        </div>
      </div>
      <div>
        <span class="proceed-button"><p>Process withdrawal</p></span>
        <span
          style="
            font-size: 12px;
            font-style: normal;
            font-weight: 400;
            line-height: normal;
          "
          >Having any issues?<a
            style="
              font-size: 12px;
              font-style: normal;
              font-weight: 500;
              line-height: normal;
              color: #5e779d;
            "
          >
            Contact us</a
          ></span
        >
      </div>
    </div>
  </body>
</html>
