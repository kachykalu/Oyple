<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oyple</title>
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="centralizer">
    <div class="withdrawal-available">
      <div>
        <div class="vector-img"><img src="../assets/Vector.svg" alt="" /></div>
        <div>
          <p
            style="
              font-size: 20px;
              font-style: normal;
              font-weight: 500;
              line-height: 140%;
              color: #6b6c7e;
            "
          >
            Available to withdraw
          </p>
          <h1>₦47,500</h1>
          <hr
            style="
              margin-top: 32px;
              margin-bottom: 32px;
              border: 1px solid #eee;
            "
          />
          <p
            style="
              font-size: 14px;
              font-style: normal;
              font-weight: 500;
              line-height: normal;
            "
          >
            Choose payment method
          </p>
          <div class="direct-arrow">
            <span class="direct-bank">
              <img src="../assets/mdi_bank-outline.svg" alt="" />
              <p
                style="
                  font-size: 14px;
                  font-style: normal;
                  font-weight: 400;
                  line-height: 20px;
                "
              >
                Direct bank deposit
              </p>
            </span>
            <img src="../assets/iconamoon_arrow-up-2.svg" alt="" />
          </div>
          <span
            style="
              font-size: 12px;
              font-style: normal;
              font-weight: 400;
              line-height: normal;
            "
            >Weekly payouts.<a
              style="
                font-size: 12px;
                font-style: normal;
                font-weight: 500;
                line-height: normal;
                color: #5e779d;
              "
            >
              Change</a
            ></span
          >
        </div>
      </div>
      <div>
      <span class="proceed-button"><p>Setup payments</p></span>
      <span
        style="
          font-size: 12px;
          font-style: normal;
          font-weight: 400;
          line-height: normal;
        "
        >Having any issues?<a
          style="
            font-size: 12px;
            font-style: normal;
            font-weight: 500;
            line-height: normal;
            color: #5e779d;
          "
        >
          Contact us</a
        ></span
      ></div>
    </div>
  </body>
</html>
