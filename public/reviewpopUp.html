<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oyple</title>
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="centralizer">
    <div class="unger-review">
      <span class="user-search">
        <img src="../assets/user-search.svg" alt="" />
      </span>
      <h3
        style="
          font-size: 18px;
          font-style: normal;
          font-weight: 500;
          line-height: 150%;
        "
      >
        Unger review
      </h3>
      <p
        style="
          color: #667085;
          font-size: 14px;
          font-size: 14px;
          font-style: normal;
          font-weight: 400;
          line-height: 20px;
          margin-bottom: 8px;
        "
      >
      Your provided information is being reviewed. You will be notified on the status of the review and your withdrawal in [Time].
      </p>
      
      <span class="proceed-button"><p>Return to wallet</p></span>
    </div>
  </body>
</html>
